name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  # ============================================================================
  # CI JOB: Rust, Python, Julia, Node.js, WASM, C++
  # ============================================================================
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---- Toolchain Setup ----
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Install Rust GNU (Windows)
        if: matrix.os == 'windows-latest'
        run: rustup toolchain install stable-x86_64-pc-windows-gnu

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.os }}-cargo

      # ========================================================================
      # RUST
      # ========================================================================
      - name: "Rust: Format Check"
        run: |
          cargo fmt -p loess-rs --all -- --check
          cargo fmt -p fastLoess --all -- --check

      - name: "Rust: Clippy"
        run: |
          cargo clippy -p loess-rs --all-targets -- -D warnings
          cargo clippy -p fastLoess --all-targets --features cpu -- -D warnings
          cargo clippy -p fastLoess --all-targets --features gpu -- -D warnings

      - name: "Rust: Loess-rs Tests"
        run: |
          cargo test -q -p loess-project-tests --test loess-rs
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cargo test -q -p loess-project-tests --test loess-rs --no-default-features
          fi
        shell: bash

      - name: "Rust: fastLoess Build"
        run: |
          cargo build -p fastLoess --features cpu
          cargo build -p fastLoess --features gpu

      - name: "Rust: fastLoess Tests"
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
             sudo apt-get update && sudo apt-get install -y libvulkan1 mesa-vulkan-drivers
             export GALLIUM_DRIVER=lavapipe
             cargo test -q -p loess-project-tests --test fastLoess --features gpu
          else
             cargo test -q -p loess-project-tests --test fastLoess --features cpu
          fi
        shell: bash

      - name: "Rust: Documentation"
        run: |
          cargo doc -p loess-rs --no-deps
          cargo doc -p fastLoess --no-deps --features cpu
          cargo doc -p fastLoess --no-deps --features gpu
        env:
          RUSTDOCFLAGS: -D warnings

      - name: "Rust: Run Examples"
        run: |
          for example in examples/loess-rs/*.rs examples/fastLoess/*.rs; do
            name=$(basename "$example" .rs)
            echo "Running example: $name"
            cargo run -p examples --example "$name" --features cpu
          done
        shell: bash

      # ========================================================================
      # PYTHON
      # ========================================================================
      - name: "Python: Setup & Build"
        working-directory: bindings/python
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest numpy ruff matplotlib
          pip install .

      - name: "Python: Lint (Ruff)"
        working-directory: bindings/python
        run: |
          ruff format --check python/fastloess/ ../../tests/python/
          ruff check python/fastloess/ ../../tests/python/

      - name: "Python: Tests"
        working-directory: bindings/python
        run: pytest ../../tests/python/ -v

      - name: "Python: Examples"
        working-directory: bindings/python
        run: |
          python ../../examples/python/batch_smoothing.py
          python ../../examples/python/streaming_smoothing.py
          python ../../examples/python/online_smoothing.py

      # ========================================================================
      # JULIA
      # ========================================================================
      - name: "Julia: Build"
        working-directory: bindings/julia
        run: |
          cargo build --release
      - name: "Julia: Verify Exports"
        if: matrix.os == 'ubuntu-latest'
        run: |
          nm -D target/release/libfastloess_jl.so | grep -q jl_loess_fit || exit 1
          nm -D target/release/libfastloess_jl.so | grep -q jl_streaming_loess_new || exit 1
          nm -D target/release/libfastloess_jl.so | grep -q jl_online_loess_new || exit 1
          nm -D target/release/libfastloess_jl.so | grep -q jl_loess_free_result || exit 1

      - name: "Julia: Relax JLL dependency for CI"
        shell: bash
        run: |
          # Extract current version and compat requirement
          VERSION=$(grep "^version =" bindings/julia/julia/Project.toml | head -n 1 | cut -d '"' -f 2)
          # Get fastloess_jll from [compat] specifically to avoid UUID in [deps]
          COMPAT=$(sed -n '/\[compat\]/,/\[/p' bindings/julia/julia/Project.toml | grep "fastloess_jll" | cut -d '"' -f 2)
          echo "Current Project Version: $VERSION"
          echo "Current JLL Compat: $COMPAT"

          # Query latest available JLL version from Registry
          AVAILABLE=$(julia -e '
            using Pkg
            uuid = Base.UUID("7381d214-3001-5784-8d9a-8eb8e8688076")
            try
              Pkg.Registry.update()
              regs = Pkg.Registry.reachable_registries()
              latest = "0.99.9"
              for reg in regs
                if haskey(reg.pkgs, uuid)
                  info = reg.pkgs[uuid]
                  vers = keys(Pkg.Registry.all_versions(info))
                  latest = string(maximum(vers))
                  break
                end
              end
              print(latest)
            catch
              print("0.99.9")
            end')
          echo "Latest Registered JLL Version: $AVAILABLE"

          # Only relax if the required version exceeds what is currently registered
          if [ "$COMPAT" = "$VERSION" ]; then
            echo "Relaxing JLL dependency: $COMPAT -> >= $AVAILABLE"
            julia -e "path = \"bindings/julia/julia/Project.toml\"; write(path, replace(read(path, String), \"fastloess_jll = \\\"$COMPAT\\\"\" => \"fastloess_jll = \\\">= $AVAILABLE\\\"\"))"
          fi

      - name: "Julia: Tests"
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            export FASTLOESS_LIB="target/release/fastloess_jl.dll"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            export FASTLOESS_LIB="target/release/libfastloess_jl.dylib"
          else
            export FASTLOESS_LIB="target/release/libfastloess_jl.so"
          fi
          julia -e 'using Pkg; Pkg.activate("bindings/julia/julia"); Pkg.instantiate(); include("tests/julia/test_FastLOESS.jl")'

      - name: "Julia: Examples"
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            export FASTLOESS_LIB="target/release/fastloess_jl.dll"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            export FASTLOESS_LIB="target/release/libfastloess_jl.dylib"
          else
            export FASTLOESS_LIB="target/release/libfastloess_jl.so"
          fi
          julia --project=bindings/julia/julia examples/julia/batch_smoothing.jl
          julia --project=bindings/julia/julia examples/julia/streaming_smoothing.jl
          julia --project=bindings/julia/julia examples/julia/online_smoothing.jl

      - name: "Julia: Lint"
        working-directory: bindings/julia
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      # ========================================================================
      # NODE.JS
      # ========================================================================
      - name: "Node.js: Build"
        working-directory: bindings/nodejs
        run: |
          npm install
          npm run build

      - name: "Node.js: Tests"
        working-directory: bindings/nodejs
        run: npm test

      - name: "Node.js: Examples"
        working-directory: bindings/nodejs
        run: |
          node ../../examples/nodejs/batch_smoothing.js
          node ../../examples/nodejs/streaming_smoothing.js
          node ../../examples/nodejs/online_smoothing.js

      - name: "Node.js: Lint"
        working-directory: bindings/nodejs
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      # ========================================================================
      # WEBASSEMBLY (Ubuntu only for build simplicity)
      # ========================================================================
      - name: "WebAssembly: Build & Test"
        working-directory: bindings/wasm
        run: |
          wasm-pack build --target nodejs --out-dir pkg
          wasm-pack build --target web --out-dir pkg-web
          wasm-pack test --node
          node ../../tests/wasm/test_fastloess_wasm.js

      - name: "WebAssembly: Lint"
        working-directory: bindings/wasm
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings

      # ========================================================================
      # C++
      # ========================================================================
      - name: "C++: Build"
        working-directory: bindings/cpp
        run: cargo build --release

      - name: "C++: Examples (Ubuntu only)"
        if: matrix.os == 'ubuntu-latest'
        working-directory: bindings/cpp
        run: |
          mkdir -p bin
          g++ -O3 ../../examples/cpp/batch_smoothing.cpp -o bin/batch_smoothing -Iinclude -L../../target/release -lfastloess_cpp -lpthread -ldl -lm
          g++ -O3 ../../examples/cpp/streaming_smoothing.cpp -o bin/streaming_smoothing -Iinclude -L../../target/release -lfastloess_cpp -lpthread -ldl -lm
          g++ -O3 ../../examples/cpp/online_smoothing.cpp -o bin/online_smoothing -Iinclude -L../../target/release -lfastloess_cpp -lpthread -ldl -lm
          LD_LIBRARY_PATH=../../target/release ./bin/batch_smoothing
          LD_LIBRARY_PATH=../../target/release ./bin/streaming_smoothing
          LD_LIBRARY_PATH=../../target/release ./bin/online_smoothing

      - name: "C++: Lint"
        working-directory: bindings/cpp
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
