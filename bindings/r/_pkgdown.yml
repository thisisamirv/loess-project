url: https://thisisamirv.github.com/loess-project/
template:
  package: srr
  bootstrap: 5
  bootswatch: flatly

development:
  mode: auto

reference:
  - title: Core LOESS Interface
    desc: Main R6 classes for LOESS smoothing.
    contents:
      - rfastloess-package
      - Loess
      - StreamingLoess
      - OnlineLoess
  - title: Results and Utilities
    desc: Objects returned by fit methods and helper functions.
    contents:
      - plot.LoessResult
